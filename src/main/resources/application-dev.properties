# Dev profile: H2 for schema-only testing (V1 only — no PostGIS)
# For full spatial testing, use application-devpg.properties against a real PostgreSQL
spring.datasource.url=jdbc:h2:file:./data/emissionmap;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.thymeleaf.cache=false

# Only run V1 in H2 — V2 requires PostGIS which H2 does not support
spring.flyway.target=1

emissionmap.data.bootstrap-enabled=false
emissionmap.data.dir=/Users/manojbade/workspace/emissionmap/data
emissionmap.data.years=2022,2023,2024
